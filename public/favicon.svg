<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39ff14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="url(#neonGradient)" stroke-width="3"/>
  
  <!-- Morse code pattern (SOS: ... --- ...) -->
  <g filter="url(#neonGlow)" fill="url(#neonGradient)">
    <!-- Dots for S -->
    <circle cx="25" cy="40" r="4"/>
    <circle cx="35" cy="40" r="4"/>
    <circle cx="45" cy="40" r="4"/>
    
    <!-- Dashes for O -->
    <rect x="52" y="36" width="8" height="8" rx="2"/>
    <rect x="64" y="36" width="8" height="8" rx="2"/>
    <rect x="76" y="36" width="8" height="8" rx="2"/>
    
    <!-- Dots for S -->
    <circle cx="25" cy="60" r="4"/>
    <circle cx="35" cy="60" r="4"/>
    <circle cx="45" cy="60" r="4"/>
  </g>
  
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#neonGradient)" stroke-width="1" opacity="0.5" filter="url(#neonGlow)"/>
</svg>
